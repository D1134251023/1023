<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>抽籤程式</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
}

h1 {
    color: #333;
}

textarea {
    width: 300px;
    height: 120px;
    font-size: 16px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    font-size: 24px;
    color: #d63384;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>🎲 抽籤程式</h1>

<p>請輸入名字（每行一個）</p>

<textarea id="names">
曾士豪
郭芳欣
柯怡安
</textarea>

<br>

<button onclick="drawName()">開始抽籤</button>

<div id="result"></div>

<script>
function drawName() {

    let text = document.getElementById("names").value;

    let names = text.split("\n").filter(name => name.trim() !== "");

    if (names.length === 0) {
        document.getElementById("result").innerHTML = "請先輸入名字！";
        return;
    }

    let randomIndex = Math.floor(Math.random() * names.length);

    let winner = names[randomIndex];

    document.getElementById("result").innerHTML =
        "🎉 抽到的人是： " + winner;
}
</script>

</body>
</html>
